name: localbill
description: "Local billing and invoice management — Flutter port of localbill."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking & HTML parsing (for invoice scraper)
  http: ^1.2.0
  html: ^0.15.4

  # Local file storage
  path_provider: ^2.1.4

  # Immutable collections (matches architecture pattern)
  fast_immutable_collections: ^10.2.2

  # Annotations
  meta: ^1.12.0

  # Equality helpers (already used in selector.dart)
  collection: ^1.18.0

  # Number/date formatting in reports
  intl: ^0.20.1

  # Unique IDs for transactions
  uuid: ^4.4.0

  # QR code scanner (uses native camera — Android CameraX, iOS AVFoundation)
  mobile_scanner: ^6.0.0

  # Cryptographic hashing for transaction core-hash integrity
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
